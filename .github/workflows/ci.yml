name: CI

on:
  push:
  pull_request:

jobs:
  boundary-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Boundary and ownership guards
        run: |
          cargo test --test legacy_guards --quiet
          cargo test --test frontend_boundaries --quiet
          cargo test --test ir_opt_boundaries --quiet
          cargo test --test dependency_boundaries --quiet

  public-api-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Public API inventory guard
        run: cargo test --test public_api_contracts --quiet

  test-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (std)
        run: cargo test --all-targets --quiet

  check-no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check (no default features)
        run: cargo check --no-default-features --quiet
